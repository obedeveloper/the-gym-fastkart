<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Fastkart</title>
    <link rel="shortcut icon" href="./images/1_2.png" type="image/x-icon" />
  </head>
  <body>
    <header
      class="wrapper flex justify-end bg-brand py-2.5 text-white md:justify-between"
    >
      <div class="hidden h-lh overflow-hidden md:block" id="header-text">
        <p>
          <strong>Welcome to Fastkart!</strong>Wrap new offers/gift every single
          day on Weekends.<strong>New Coupon Code: Fast024 </strong>
        </p>
        <p>
          Something you love is now on sale!
          <a href="" class="font-semibold underline">Buy Now !</a>
        </p>
      </div>
      <div class="flex justify-end gap-2 *:flex *:items-center [&_img]:w-5">
        <div>
          <img src="../images/united-states.png" alt="" class="me-2 w-5!" />
          <span>English</span>
          <img src="../images/chevron.png" alt="" />
        </div>
        <span class="border-l-2 border-gray-300/40"></span>
        <div>
          <span>USD</span>
          <img src="../images/chevron.png" alt="" />
        </div>
      </div>
    </header>
    <main>
      <nav
        class="wrapper grid grid-cols-[auto_1fr_auto] items-center gap-3 py-5"
      >
        <button class="text-left text-2xl font-bold lg:hidden">☰</button>
        <div
          class="flex items-center gap-4 justify-self-center md:justify-self-start"
        >
          <img src="./images/1.png" alt="" class="w-30 md:w-32" />
          <img
            src="./images/location-pin.svg"
            alt=""
            class="h-9 rounded-lg border-2 border-gray-300 bg-gray-200/50 p-1"
          />
        </div>
        <div class="hidden justify-self-center lg:flex">
          <input
            type="search"
            placeholder="I'm searching for..."
            class="min-w-120 rounded-tl rounded-bl border border-r-0 border-gray-400 px-3 focus:border-brand focus-visible:outline-0"
          />
          <button
            class="cursor-pointer rounded-tr rounded-br bg-yellow-600/90 p-3"
          >
            <img src="./images/search-alt.svg" alt="" class="w-6" />
          </button>
        </div>
        <div class="flex gap-1 justify-self-end">
          <div
            class="hidden gap-2 *:border-r-2 *:border-gray-300/80 *:pe-3 md:flex [&_img]:w-10"
          >
            <img src="./images/search.svg" alt="" class="lg:hidden" />
            <img src="./images/call-ringing.svg" alt="" />
            <img src="./images/heart.svg" alt="" />
            <div class="stack grid">
              <img src="./images/cart.svg" alt="" />
              <span
                class="grid aspect-square w-5 place-content-center justify-self-end rounded bg-red-400 text-sm text-white"
                >2</span
              >
            </div>
          </div>
          <img src="./images/user.svg" alt="" class="w-6" />
        </div>
      </nav>
      <nav
        class="wrapper hidden items-center justify-between py-3 md:flex [&_img]:w-10"
      >
        <button
          class="flex items-center gap-2 rounded bg-brand px-3 py-1 text-lg font-bold text-white"
        >
          <img src="./images/menu-alt.svg" alt="" />
          <span>All Caterogories</span>
        </button>
        <div
          class="hidden items-center gap-3 *:flex *:items-center *:gap-1 lg:flex [&_img]:w-6!"
        >
          <button>
            Home
            <img src="./images/chevron-down.svg" alt="" />
          </button>
          <button>
            Shop
            <img src="./images/chevron-down.svg" alt="" />
          </button>
          <button>
            Product
            <img src="./images/chevron-down.svg" alt="" />
          </button>
          <button>
            Mega menu
            <img src="./images/chevron-down.svg" alt="" />
          </button>
          <button>
            Blog
            <img src="./images/chevron-down.svg" alt="" />
          </button>
          <button class="relative">
            <small
              class="absolute -top-4 left-2.5 rounded-tl rounded-br bg-red-500 px-1 py-px text-xs text-white"
              >New</small
            >
            Pages
            <img src="./images/chevron-down.svg" alt="" />
          </button>
          <button>
            Seller
            <img src="./images/chevron-down.svg" alt="" />
          </button>
        </div>
        <button class="aspect-square rounded bg-brand/10 p-1">
          <img src="./images/thunder.svg" alt="" />
        </button>
      </nav>
    </main>
  </body>
</html>
